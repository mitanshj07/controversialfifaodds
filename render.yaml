services:
  - type: web
    name: controversialfifaodds
    runtime: node
    repo: https://github.com/mitanshj07/controversialfifaodds
    branch: main
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://controversialfifaodds.vercel.app
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: SOLANA_NETWORK
        value: devnet
      - key: SOLANA_TREASURY_WALLET
        value: 6MS566y46t3C37p7TnnK7yieoSbLimWEwwKemXxFMJ5A
      - key: CONTEST_ENTRY_WINDOW_MS
        value: "20000"
      # TxLINE World Cup free-tier credentials are intentionally supplied in
      # Render's secret environment UI after on-chain activation. Never place
      # their values in this repository or in Vercel.
      - key: TXLINE_BASE_URL
        value: https://txline-dev.txodds.com
      - key: TXLINE_GUEST_JWT
        sync: false
      - key: TXLINE_API_TOKEN
        sync: false
      - key: TXLINE_FIXTURE_ID
        sync: false
